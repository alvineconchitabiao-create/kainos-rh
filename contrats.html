<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Générateur de Contrats & Lettres – Elite RH Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
<style>
:root {
  --noir:#0C0C0C; --noir2:#161616; --noir3:#1E1E1E;
  --or:#C9A84C; --or2:#E2C47A; --or-pale:#FDF6E3;
  --blanc:#FAFAF8; --gris:#8A8880; --gris2:#C8C6BF; --gris3:#ECEAE3;
  --bleu:#1A5FA8; --vert:#2D6A1F; --rouge:#A32020;
  --vert-clair:#EAF4E3; --rouge-clair:#FCEAEA; --bleu-clair:#E6F0FB;
  --fond:#F2F0EA;
  --fd:'Playfair Display',serif; --fb:'Outfit',sans-serif;
  --r:10px; --rl:16px; --rxl:24px;
  --sh:0 2px 12px rgba(0,0,0,0.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--fond);color:var(--noir);min-height:100vh}

/* HEADER */
header{background:var(--noir);height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:200;border-bottom:1px solid rgba(201,168,76,0.2)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:34px;height:34px;border:1.5px solid var(--or);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:13px;color:var(--or);font-weight:600;letter-spacing:0.05em}
.logo-text{font-family:var(--fd);font-size:15px;color:var(--blanc);font-weight:500;letter-spacing:0.05em}
.logo-text span{color:var(--or)}
.back-link{font-size:12px;color:var(--gris2);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .2s}
.back-link:hover{color:var(--or)}

/* LAYOUT */
.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 62px)}

/* SIDEBAR */
.sidebar{background:var(--noir2);border-right:1px solid rgba(255,255,255,0.06);padding:1.5rem 0;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto;display:flex;flex-direction:column;gap:0}
.sidebar-section{padding:0.5rem 1.25rem 0.25rem;font-size:9px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:rgba(201,168,76,0.5);margin-top:0.5rem}
.doc-btn{display:flex;align-items:center;gap:10px;padding:11px 1.25rem;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s;position:relative}
.doc-btn:hover{background:rgba(255,255,255,0.04)}
.doc-btn.active{background:rgba(201,168,76,0.1)}
.doc-btn.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--or)}
.doc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.doc-name{font-size:13px;font-weight:500;color:var(--blanc);flex:1;line-height:1.3}
.doc-name small{display:block;font-size:10px;color:var(--gris);font-weight:400;margin-top:1px}
.doc-arrow{font-size:10px;color:var(--or);opacity:0}
.doc-btn.active .doc-arrow{opacity:1}

/* MAIN */
.main{padding:2rem;overflow-y:auto}
.step-header{margin-bottom:1.75rem}
.step-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.25);border-radius:20px;font-size:11px;color:var(--or);font-weight:600;letter-spacing:0.05em;margin-bottom:10px}
.step-title{font-family:var(--fd);font-size:26px;font-weight:600;color:var(--noir);line-height:1.2}
.step-desc{font-size:13px;color:var(--gris);margin-top:6px;line-height:1.6;max-width:600px}

/* FORM GRID */
.form-card{background:white;border-radius:var(--rl);border:1px solid var(--gris3);padding:1.5rem;margin-bottom:1.25rem;box-shadow:var(--sh)}
.form-card-title{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--noir);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--gris3)}
.form-card-title .icon{font-size:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--gris)}
.field input,.field select,.field textarea{font-family:var(--fb);font-size:13px;color:var(--noir);background:var(--fond);border:1px solid var(--gris3);border-radius:var(--r);padding:9px 12px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(201,168,76,0.1)}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field-note{font-size:11px;color:var(--gris);margin-top:2px;font-style:italic}

/* TYPE SELECTOR */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.type-card{border:1px solid var(--gris3);border-radius:var(--rl);padding:1rem;cursor:pointer;background:white;transition:all .2s;text-align:left}
.type-card:hover{border-color:var(--or);background:var(--or-pale)}
.type-card.selected{border-color:var(--or);background:var(--or-pale);box-shadow:0 0 0 2px rgba(201,168,76,0.2)}
.type-card-icon{font-size:22px;margin-bottom:6px}
.type-card-name{font-size:13px;font-weight:600;color:var(--noir);font-family:var(--fd)}
.type-card-desc{font-size:11px;color:var(--gris);margin-top:3px;line-height:1.4}

/* ACTIONS */
.action-bar{display:flex;gap:10px;margin-top:1.5rem;flex-wrap:wrap;padding-top:1.5rem;border-top:1px solid var(--gris3)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--fb);transition:all .15s;border:none;text-decoration:none}
.btn-primary{background:var(--noir);color:var(--or)}
.btn-primary:hover{background:var(--noir3)}
.btn-secondary{background:white;color:var(--noir);border:1px solid var(--gris3)}
.btn-secondary:hover{border-color:var(--or);color:var(--or)}
.btn-blue{background:var(--bleu);color:white}
.btn-blue:hover{background:#134d8a}
.btn-green{background:var(--vert);color:white}
.btn-green:hover{background:#235518}

/* PREVIEW */
.preview-wrap{background:white;border-radius:var(--rl);border:1px solid var(--gris3);overflow:hidden;margin-bottom:1.5rem}
.preview-toolbar{background:var(--noir);padding:0.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.preview-toolbar-title{font-size:13px;color:var(--gris2);font-family:var(--fd)}
.preview-toolbar-title span{color:var(--or)}
.preview-body{padding:3rem 3.5rem;font-size:13px;line-height:1.8;color:#1a1a1a;min-height:300px;max-height:580px;overflow-y:auto}
.preview-body h1{font-family:var(--fd);font-size:18px;font-weight:700;text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.08em}
.preview-body h2{font-family:var(--fd);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin:18px 0 8px;border-bottom:2px solid #1a1a1a;padding-bottom:4px}
.preview-body p{margin-bottom:10px}
.preview-body .meta-row{display:flex;gap:2rem;margin:12px 0;flex-wrap:wrap}
.preview-body .meta-item{font-size:12px}
.preview-body .meta-item strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#888;margin-bottom:2px}
.preview-body .sign-block{margin-top:3rem;display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.preview-body .sign-col{text-align:center}
.preview-body .sign-line{border-top:1px solid #333;margin-top:2rem;padding-top:8px;font-size:11px;color:#555}
.preview-body .article{margin-bottom:12px}
.preview-body .article-title{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.preview-body .highlight{background:#FDF6E3;border-left:3px solid var(--or);padding:8px 12px;margin:10px 0;font-size:12px}

/* SECTION TOGGLE */
.section-toggle{display:none}

/* RESPONSIVE */
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-280px;top:62px;z-index:150;transition:left .3s;height:calc(100vh - 62px)}
  .sidebar.open{left:0}
  .form-grid,.form-grid-3,.type-grid{grid-template-columns:1fr}
  .main{padding:1rem}
  .preview-body{padding:1.5rem}
}

@media print{
  header,.sidebar,.action-bar,.preview-toolbar,.step-header,.form-card{display:none!important}
  .app{display:block}
  .preview-body{max-height:none;padding:0;font-size:12pt;line-height:1.8}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <div class="logo-mark">E·RH</div>
    <div class="logo-text">Elite RH <span>Consulting</span></div>
  </a>
  <a href="index.html" class="back-link">← Retour au site</a>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">Contrats de travail</div>

    <button class="doc-btn active" onclick="setDoc('contrat')" id="btn-contrat">
      <div class="doc-icon" style="background:rgba(26,95,168,0.15)">📄</div>
      <div class="doc-name">Contrat de travail<small>CDI ou CDD au choix</small></div>
      <span class="doc-arrow">›</span>
    </button>

    <button class="doc-btn" onclick="setDoc('stage')" id="btn-stage">
      <div class="doc-icon" style="background:rgba(201,168,76,0.15)">🎓</div>
      <div class="doc-name">Stage / Apprentissage<small>Convention de stage</small></div>
      <span class="doc-arrow">›</span>
    </button>


    <button class="doc-btn" onclick="setDoc('expatrie')" id="btn-expatrie">
      <div class="doc-icon" style="background:rgba(100,60,180,0.15)">✈️</div>
      <div class="doc-name">CDD Expatrié<small>Contrat international</small></div>
      <span class="doc-arrow">›</span>
    </button>

    <div class="sidebar-section" style="margin-top:1rem">Courriers RH</div>

    <button class="doc-btn" onclick="setDoc('embauche')" id="btn-embauche">
      <div class="doc-icon" style="background:rgba(45,106,31,0.15)">✉️</div>
      <div class="doc-name">Lettre d'embauche<small>Proposition officielle</small></div>
      <span class="doc-arrow">›</span>
    </button>

    <button class="doc-btn" onclick="setDoc('renouvellement')" id="btn-renouvellement">
      <div class="doc-icon" style="background:rgba(201,168,76,0.15)">🔄</div>
      <div class="doc-name">Renouvellement de contrat<small>Lettre de renouvellement</small></div>
      <span class="doc-arrow">›</span>
    </button>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="main-content">
    <!-- Contenu injecté par JS -->
  </main>

</div>

<script>
// ─────────────────────────────────────────────
// ÉTAT
// ─────────────────────────────────────────────
let currentDoc = 'cdi';
const state = {};

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function setDoc(type) {
  currentDoc = type;
  document.querySelectorAll('.doc-btn').forEach(b => b.classList.remove('active'));
  const btnId = (type === 'cdi' || type === 'cdd') ? 'btn-contrat' : 'btn-' + type;
  const btn = document.getElementById(btnId);
  if (btn) btn.classList.add('active');
  renderForm(type);
}

// ─────────────────────────────────────────────
// CHAMPS COMMUNS EMPLOYEUR / EMPLOYÉ
// ─────────────────────────────────────────────
const fieldsEmployeur = `
  <div class="form-grid">
    <div class="field"><label>Raison sociale *</label><input type="text" id="emp-raison" placeholder="Ex: SARL BENIN TECH" oninput="updatePreview()"/></div>
    <div class="field"><label>Forme juridique</label><input type="text" id="emp-forme" placeholder="Ex: SARL, SA, ONG..." oninput="updatePreview()"/></div>
    <div class="field"><label>N° RCCM / IFU</label><input type="text" id="emp-rccm" placeholder="Numéro d'immatriculation" oninput="updatePreview()"/></div>
    <div class="field"><label>Siège social</label><input type="text" id="emp-siege" placeholder="Adresse complète" oninput="updatePreview()"/></div>
    <div class="field"><label>Représentant légal</label><input type="text" id="emp-rep" placeholder="Nom du DG / Directeur" oninput="updatePreview()"/></div>
    <div class="field"><label>Qualité du représentant</label><input type="text" id="emp-qual" placeholder="Ex: Directeur Général" oninput="updatePreview()"/></div>
  </div>`;

const fieldsEmploye = `
  <div class="form-grid">
    <div class="field"><label>Nom *</label><input type="text" id="sal-nom" placeholder="Nom de famille" oninput="updatePreview()"/></div>
    <div class="field"><label>Prénom(s) *</label><input type="text" id="sal-prenom" placeholder="Prénom(s)" oninput="updatePreview()"/></div>
    <div class="field"><label>Date de naissance</label><input type="date" id="sal-ddn" oninput="updatePreview()"/></div>
    <div class="field"><label>Lieu de naissance</label><input type="text" id="sal-lieu-nais" placeholder="Ville, Pays" oninput="updatePreview()"/></div>
    <div class="field"><label>Nationalité</label><input type="text" id="sal-nat" placeholder="Ex: Béninoise" oninput="updatePreview()"/></div>
    <div class="field"><label>N° pièce d'identité</label><input type="text" id="sal-pi" placeholder="CIN / Passeport" oninput="updatePreview()"/></div>
    <div class="field"><label>Adresse de résidence</label><input type="text" id="sal-adresse" placeholder="Adresse complète" oninput="updatePreview()"/></div>
    <div class="field"><label>Téléphone</label><input type="text" id="sal-tel" placeholder="+229..." oninput="updatePreview()"/></div>
  </div>`;

const fieldsPoste = (extra='') => `
  <div class="form-grid">
    <div class="field"><label>Intitulé du poste *</label><input type="text" id="poste-titre" placeholder="Ex: Responsable Commercial" oninput="updatePreview()"/></div>
    <div class="field"><label>Département / Service</label><input type="text" id="poste-dept" placeholder="Ex: Direction Commerciale" oninput="updatePreview()"/></div>
    <div class="field"><label>Lieu de travail</label><input type="text" id="poste-lieu" placeholder="Ex: Cotonou, Bénin" oninput="updatePreview()"/></div>
    <div class="field"><label>Classification / Catégorie</label><input type="text" id="poste-cat" placeholder="Ex: Cadre, Agent de maîtrise..." oninput="updatePreview()"/></div>
    ${extra}
  </div>`;

const fieldsRemuneration = (showPrime=true) => `
  <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:13px;font-family:var(--fb)">
      <thead>
        <tr style="background:var(--noir);color:var(--or)">
          <th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;width:60%">Composante salariale</th>
          <th style="padding:9px 12px;text-align:right;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;width:40%">Montant (FCFA)</th>
        </tr>
      </thead>
      <tbody>
        <tr style="border-bottom:1px solid var(--gris3)">
          <td style="padding:9px 12px"><label style="font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.08em">Salaire Catégoriel</label>
            <div style="font-size:11px;color:var(--gris);font-style:italic">Selon grille de classification conventionnelle</div></td>
          <td style="padding:9px 12px;text-align:right"><input type="text" id="rem-categoriel" placeholder="0" style="text-align:right;width:140px;font-family:var(--fb);font-size:13px;color:var(--noir);background:var(--fond);border:1px solid var(--gris3);border-radius:var(--r);padding:7px 10px;outline:none" oninput="calcBrut()"/></td>
        </tr>
        <tr style="border-bottom:1px solid var(--gris3)">
          <td style="padding:9px 12px"><label style="font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.08em">Sursalaire</label>
            <div style="font-size:11px;color:var(--gris);font-style:italic">Complément au-delà du salaire catégoriel</div></td>
          <td style="padding:9px 12px;text-align:right"><input type="text" id="rem-sursalaire" placeholder="0" style="text-align:right;width:140px;font-family:var(--fb);font-size:13px;color:var(--noir);background:var(--fond);border:1px solid var(--gris3);border-radius:var(--r);padding:7px 10px;outline:none" oninput="calcBrut()"/></td>
        </tr>
        <tr style="background:#fafaf8;border-bottom:2px solid var(--or)">
          <td style="padding:9px 12px"><label style="font-size:11px;font-weight:700;color:var(--noir);text-transform:uppercase;letter-spacing:.08em">= Salaire de Base</label>
            <div style="font-size:11px;color:var(--gris);font-style:italic">Catégoriel + Sursalaire (calculé auto)</div></td>
          <td style="padding:9px 12px;text-align:right"><input type="text" id="rem-base" placeholder="0" readonly style="text-align:right;width:140px;font-family:var(--fb);font-size:13px;font-weight:700;color:var(--bleu);background:#e8f0fb;border:1px solid #b3cef0;border-radius:var(--r);padding:7px 10px;outline:none;cursor:default"/></td>
        </tr>
        <tr style="border-bottom:1px solid var(--gris3)">
          <td style="padding:9px 12px"><label style="font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.08em">Prime d'ancienneté</label>
            <div style="font-size:11px;color:var(--gris);font-style:italic">5% du salaire de base par tranche de 2 ans</div></td>
          <td style="padding:9px 12px;text-align:right"><input type="text" id="rem-anciennete" placeholder="0" style="text-align:right;width:140px;font-family:var(--fb);font-size:13px;color:var(--noir);background:var(--fond);border:1px solid var(--gris3);border-radius:var(--r);padding:7px 10px;outline:none" oninput="calcBrut()"/></td>
        </tr>
        <tbody id="primes-rows-container"> </tbody>
        <tr>
          <td colspan="2" style="padding:6px 12px;border-bottom:1px solid var(--gris3)">
            <button type="button" onclick="addPrime()" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:none;border:1px dashed var(--or);border-radius:var(--r);font-size:12px;font-weight:600;color:var(--or);cursor:pointer;font-family:var(--fb);transition:all .15s" onmouseover="this.style.background='rgba(201,168,76,0.08)'" onmouseout="this.style.background='none'">
              + Ajouter une prime
            </button>
          </td>
        </tr>
        <tr style="background:var(--noir)">
          <td style="padding:11px 12px"><label style="font-size:12px;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:.1em">SALAIRE BRUT TOTAL</label></td>
          <td style="padding:11px 12px;text-align:right"><input type="text" id="rem-salaire" readonly style="text-align:right;width:140px;font-family:var(--fb);font-size:15px;font-weight:700;color:var(--or);background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);border-radius:var(--r);padding:7px 10px;outline:none;cursor:default"/></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="form-grid" style="margin-top:12px">
    <div class="field"><label>Mode de paiement</label>
      <select id="rem-mode" onchange="updatePreview()">
        <option>Virement bancaire</option><option>Espèces</option><option>Mobile Money</option><option>Chèque</option>
      </select>
    </div>
    <div class="field"><label>Avantages en nature (optionnel)</label>
      <input type="text" id="rem-avantages" placeholder="Ex: Véhicule, logement de fonction..." oninput="updatePreview()"/>
    </div>
  </div>`;

// ─────────────────────────────────────────────
// FORMULAIRES PAR TYPE
// ─────────────────────────────────────────────
const forms = {

  contrat: () => `
    <div class="step-header">
      <div class="step-tag">📄 Contrat de travail</div>
      <h1 class="step-title">Contrat de Travail</h1>
      <p class="step-desc">Contrat conforme au Code du Travail béninois (Loi n°98-004 du 27 janvier 1998), à la Loi n°2017-05 du 29 août 2017 portant Code de Sécurité Sociale, et aux textes réglementaires en vigueur. Choisissez le type ci-dessous.</p>
    </div>

    <div class="form-card">
      <div class="form-card-title"><span class="icon">⚖️</span>Type de contrat</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:0.5rem">
        <div id="type-cdi-card" onclick="selectContratType('cdi')" style="border:2px solid var(--or);border-radius:var(--rl);padding:1.2rem;cursor:pointer;background:rgba(201,168,76,0.06);transition:all .2s">
          <div style="font-size:22px;margin-bottom:6px">📄</div>
          <div style="font-family:var(--fd);font-size:15px;font-weight:700;color:var(--noir)">CDI</div>
          <div style="font-size:12px;color:var(--gris);margin-top:3px">Contrat à Durée Indéterminée</div>
          <div style="margin-top:8px;font-size:11px;color:var(--bleu)">✓ Sélectionné</div>

function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function fmtDate(d) {
  if (!d) return '_______________';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
}

function selectContratType(type) {
  const el = document.getElementById('contrat-type-sel');
  if (el) el.value = type;

  // Visuels des cartes
  const cdiCard = document.getElementById('type-cdi-card');
  const cddCard = document.getElementById('type-cdd-card');
  if (cdiCard && cddCard) {
    if (type === 'cdi') {
      cdiCard.style.border = '2px solid var(--or)';
      cdiCard.style.background = 'rgba(201,168,76,0.06)';
      cdiCard.querySelector('div:last-child').style.color = 'var(--bleu)';
      cdiCard.querySelector('div:last-child').textContent = '✓ Sélectionné';
      cddCard.style.border = '1px solid var(--gris3)';
      cddCard.style.background = 'white';
      cddCard.querySelector('div:last-child').style.color = 'transparent';
      cddCard.querySelector('div:last-child').textContent = '·';
    } else {
      cddCard.style.border = '2px solid var(--or)';
      cddCard.style.background = 'rgba(201,168,76,0.06)';
      cddCard.querySelector('div:last-child').style.color = 'var(--bleu)';
      cddCard.querySelector('div:last-child').textContent = '✓ Sélectionné';
      cdiCard.style.border = '1px solid var(--gris3)';
      cdiCard.style.background = 'white';
      cdiCard.querySelector('div:last-child').style.color = 'transparent';
      cdiCard.querySelector('div:last-child').textContent = '·';
    }
  }

  // Afficher/masquer champs spécifiques
  const cddOnly = document.getElementById('cdd-only-fields');
  const cdiOnly = document.getElementById('cdi-only-fields');
  if (cddOnly) cddOnly.style.display = type === 'cdd' ? 'contents' : 'none';
  if (cdiOnly) cdiOnly.style.display = type === 'cdi' ? 'contents' : 'none';

  updatePreview();
}

      <p>Nous avons le plaisir de vous informer que votre ${type}${ref?` (Réf. : ${ref})`:''},  dont l'échéance est prévue le <strong>${finInit}</strong>, fera l'objet d'un renouvellement.</p>
      <br/>
      <div class="highlight">
        <strong>Conditions du renouvellement :</strong><br/>
        • Poste : <strong>${poste}</strong>${dept?` — ${dept}`:''}<br/>
        • Nouvelle période : du <strong>${debut}</strong> au <strong>${fin}</strong><br/>
        ${salaire?`• Nouveau salaire brut mensuel : <strong>${salaire} FCFA</strong><br/>`:'• Rémunération : inchangée<br/>'}
        ${modif?'• <strong>Des modifications ont été apportées aux conditions de travail.</strong> Un avenant vous sera soumis.<br/>':'• Toutes les autres conditions du contrat demeurent inchangées.'}
      </div>
      <br/>
      <p>Nous vous prions de bien vouloir nous retourner la présente lettre signée, précédée de la mention <em>« Lu et approuvé — Bon pour renouvellement »</em>, avant le <strong>${limite}</strong>.</p>
      <br/>
      <p>En vous remerciant de votre confiance et de votre engagement, nous vous adressons nos cordiales salutations.</p>
      <br/>
      <div class="sign-block">
        <div class="sign-col">
          <div class="sign-line"><strong>Pour ${emp}</strong><br/>${empRep}<br/>${empQual}</div>
        </div>
        <div class="sign-col">
          <div class="sign-line"><strong>M./Mme ${sal}</strong><br/><em>Lu et approuvé — Bon pour renouvellement</em></div>
        </div>
      </div>`;
  }
};

// ─────────────────────────────────────────────
// CALCUL SALAIRE BRUT
// ─────────────────────────────────────────────
function parseNum(id) {
  const el = document.getElementById(id);
  if (!el) return 0;
  const val = el.value.replace(/\s/g,'').replace(/[^\d.]/g,'');
  return parseFloat(val) || 0;
}
function fmtNum(n) {
  if (!n) return '';
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');
}

// ── Primes dynamiques
let primeCount = 0;
const primes = []; // [{id, label, montant}]

function addPrime() {
  primeCount++;
  const id = primeCount;
  primes.push({ id });
  renderPrimes();
}

function removePrime(id) {
  const idx = primes.findIndex(p => p.id === id);
  if (idx > -1) primes.splice(idx, 1);
  renderPrimes();
  calcBrut();
}

function renderPrimes() {
  const container = document.getElementById('primes-rows-container');
  if (!container) return;
  container.innerHTML = '';
  primes.forEach(function(p, i) {
    var tr = document.createElement('tr');
    tr.style.borderBottom = '1px solid #ECEAE3';

    var td1 = document.createElement('td');
    td1.style.padding = '7px 12px';

    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:6px';

    var badge = document.createElement('span');
    badge.style.cssText = 'font-size:10px;font-weight:700;color:#C9A84C;min-width:20px';
    badge.textContent = 'P' + (i + 1);

    var inputLabel = document.createElement('input');
    inputLabel.type = 'text';
    inputLabel.placeholder = 'Libellé (ex: Prime de transport)';
    inputLabel.value = p.label || '';
    inputLabel.style.cssText = 'flex:1;font-family:Outfit,sans-serif;font-size:12px;color:#0C0C0C;background:#F2F0EA;border:1px solid #ECEAE3;border-radius:10px;padding:5px 8px;outline:none';
    inputLabel.addEventListener('input', function() { primes[i].label = this.value; updatePreview(); });

    var delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.title = 'Supprimer';
    delBtn.style.cssText = 'width:22px;height:22px;border-radius:50%;border:none;background:#fceaea;color:#a32020;font-size:15px;cursor:pointer;line-height:1;flex-shrink:0;font-weight:700';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', function() { removePrime(p.id); });

    wrap.appendChild(badge);
    wrap.appendChild(inputLabel);
    wrap.appendChild(delBtn);
    td1.appendChild(wrap);

    var td2 = document.createElement('td');
    td2.style.cssText = 'padding:7px 12px;text-align:right';

    var inputMontant = document.createElement('input');
    inputMontant.type = 'text';
    inputMontant.placeholder = '0';
    inputMontant.value = p.montant || '';
    inputMontant.style.cssText = 'text-align:right;width:140px;font-family:Outfit,sans-serif;font-size:13px;color:#0C0C0C;background:#F2F0EA;border:1px solid #ECEAE3;border-radius:10px;padding:7px 10px;outline:none';
    inputMontant.addEventListener('input', function() { primes[i].montant = this.value; calcBrut(); });

    td2.appendChild(inputMontant);
    tr.appendChild(td1);
    tr.appendChild(td2);
    container.appendChild(tr);
  });
}

function getPrimesTotal() {
  return primes.reduce((s, p) => {
    const val = (p.montant||'').replace(/\s/g,'').replace(/[^\d.]/g,'');
    return s + (parseFloat(val)||0);
  }, 0);
}

function getPrimesPreview() {
  return primes
    .filter(function(p) { return p.label || p.montant; })
    .map(function(p) {
      var label = p.label || 'Prime';
      var montant = p.montant || '0';
      return '<tr style="border-bottom:1px solid #eee"><td style="padding:5px 8px;color:#555">' + label + '</td><td style="padding:5px 8px;text-align:right;font-weight:500">' + montant + ' FCFA</td></tr>';
    }).join('');
}

function calcBrut() {
  const cat = parseNum('rem-categoriel');
  const sur = parseNum('rem-sursalaire');
  const base = cat + sur;
  const anc = parseNum('rem-anciennete');
  const autresPrimes = getPrimesTotal();
  const brut = base + anc + autresPrimes;
  const baseEl = document.getElementById('rem-base');
  const brutEl = document.getElementById('rem-salaire');
  if (baseEl) baseEl.value = fmtNum(base);
  if (brutEl) brutEl.value = fmtNum(brut);
  updatePreview();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
const docTitles = {
  contrat:'Contrat de travail (CDI/CDD)', cdi:'CDI', cdd:'CDD', stage:'Convention de stage', prestation:'Prestation', expatrie:'CDD Expatrié',
  embauche:'Lettre d\'embauche', renouvellement:'Lettre de renouvellement'
};

function renderForm(type) {
  // Normalise : si on arrive sur cdi/cdd direct (anciens liens), redirige vers contrat
  if (type === 'cdi' || type === 'cdd') {
    currentDoc = 'contrat';
    document.querySelectorAll('.doc-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('btn-contrat');
    if (btn) btn.classList.add('active');
    type = 'contrat';
  }
  const main = document.getElementById('main-content');
  main.innerHTML = `
    ${forms[type]()}
    <div class="form-card">
      <div class="form-card-title"><span class="icon">👁️</span>Aperçu du document</div>
      <div class="preview-wrap">
        <div class="preview-toolbar">
          <div class="preview-toolbar-title">Aperçu — <span>${docTitles[type]}</span></div>
          <div style="font-size:11px;color:var(--gris2)">Se met à jour automatiquement</div>
        </div>
        <div class="preview-body" id="preview-body">
          <p style="text-align:center;color:#aaa;padding:2rem;font-size:13px">Remplissez les champs ci-dessus pour voir l'aperçu du document...</p>
        </div>
      </div>
      <div class="action-bar">
        <button class="btn btn-secondary" onclick="window.print()">🖨️ Imprimer / PDF</button>
        <button class="btn btn-blue" onclick="exportWord('${type}')">📝 Télécharger Word (.docx)</button>
      </div>
    </div>`;
}

function updatePreview() {
  const pb = document.getElementById('preview-body');
  if (!pb) return;
  try { pb.innerHTML = generators[currentDoc](); } catch(e) { console.error(e); }
}

// ─────────────────────────────────────────────
// EXPORT WORD
// ─────────────────────────────────────────────
async function exportWord(type) {
  const btn = event.target;
  btn.textContent = '⏳ Génération...'; btn.disabled = true;
  try {
    const { Document, Packer, Paragraph, TextRun, AlignmentType, BorderStyle } = docx;
    const content = document.getElementById('preview-body').innerHTML;

    // Extract text content cleanly
    const tmp = document.createElement('div');
    tmp.innerHTML = content;

    const children = [];
    const DARK = '1A1A1A', BLUE = '185FA5', GOLD = 'C9A84C', GRAY = '666666';

    const addPara = (text, opts={}) => {
      if (!text.trim()) return;
      children.push(new Paragraph({
        alignment: opts.center ? AlignmentType.CENTER : AlignmentType.JUSTIFIED,
        spacing: { before: opts.before||60, after: opts.after||60, line: 276 },
        border: opts.borderBottom ? { bottom: { style: BorderStyle.SINGLE, size: 6, color: BLUE, space: 4 } } : undefined,
        children: [new TextRun({
          text: text.replace(/\s+/g,' ').trim(),
          font: 'Garamond', size: opts.size||22,
          bold: opts.bold||false, color: opts.color||DARK,
          italics: opts.italic||false
        })]
      }));
    };

    // Parse HTML nodes
    const parseNode = (node) => {
      if (node.nodeType === 3) { // text
        const t = node.textContent.trim();
        if (t) addPara(t);
        return;
      }
      const tag = node.tagName?.toLowerCase();
      if (tag === 'h1') {
        children.push(new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { before: 200, after: 120 },
          border: { bottom: { style: BorderStyle.SINGLE, size: 8, color: BLUE, space: 6 } },
          children: [new TextRun({ text: node.textContent.trim(), font: 'Garamond', size: 32, bold: true, color: BLUE })]
        }));
      } else if (tag === 'h2') {
        children.push(new Paragraph({
          spacing: { before: 240, after: 100 },
          border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: DARK, space: 3 } },
          children: [new TextRun({ text: node.textContent.trim().toUpperCase(), font: 'Garamond', size: 22, bold: true, color: DARK, allCaps: true })]
        }));
      } else if (tag === 'div' && node.className.includes('highlight')) {
        children.push(new Paragraph({
          spacing: { before: 120, after: 120 },
          indent: { left: 360, right: 360 },
          border: { left: { style: BorderStyle.SINGLE, size: 8, color: GOLD, space: 8 } },
          children: [new TextRun({ text: node.textContent.replace(/\s+/g,' ').trim(), font: 'Garamond', size: 21, color: DARK })]
        }));
      } else if (tag === 'p') {
        const t = node.textContent.replace(/\s+/g,' ').trim();
        if (t) addPara(t, { before: 60, after: 60 });
      } else if (tag === 'strong' && node.parentNode.tagName?.toLowerCase() !== 'p') {
        addPara(node.textContent.trim(), { bold: true });
      } else {
        node.childNodes.forEach(parseNode);
      }
    };

    tmp.childNodes.forEach(parseNode);

    const doc = new Document({
      sections: [{
        properties: { page: { size: { width: 11906, height: 16838 }, margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 } } },
        children: children.length ? children : [new Paragraph({ children: [new TextRun({ text: 'Document vide', font: 'Garamond', size: 22 })] })]
      }]
    });

    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${type}-${v('sal-nom')||v('prest-nom')||'document'}.docx`.toLowerCase().replace(/\s+/g,'-');
    a.click(); URL.revokeObjectURL(url);
    btn.textContent = '✓ Téléchargé !';
    setTimeout(() => { btn.textContent = '📝 Télécharger Word (.docx)'; btn.disabled = false; }, 2500);
  } catch(e) {
    console.error(e);
    btn.textContent = '❌ Erreur'; btn.disabled = false;
    setTimeout(() => { btn.textContent = '📝 Télécharger Word (.docx)'; btn.disabled = false; }, 2500);
  }
}

renderForm('contrat');
